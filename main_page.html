<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>صفحه اصلی</title>
    <link rel="stylesheet" href="./css/styles.css">

</head>

<body class="main-body">

    <div class="main-container">
        <div class="main-header">
            <h1>صفحه اصلی کاربر ها</h1>
        </div>

        <div class="main-content">

            <div class="main-sidebar">
                <div class="user-sidebar">
                    <div class="user-account">
                        <div class="user-account-image">

                        </div>
                        <div class="user-account-inf">
                            <p>صاحبان ایده یا کسب‌وکار</p>
                        </div>
                        <div class="user-account-more">
                            ∨
                        </div>
                    </div>
                </div>

            </div>

            <div class="main-inf">

                <div class="option-serch-all">

                    <div class="option-serch-all-registration">
                        <p class="option-serch-all-registration-p">صاحبان کار و ایده</p>
                        <input type="checkbox" class="option-serch-all-registration-select" value="">


                        <div class="team-and-market-section" style="display: none;">
                            <!-- اندازه تیم -->
                            <div class="multi-select-wrapper form-group form-group-select">
                                <label for="toggle-team-size">اندازه تیم:</label>
                                <input type="checkbox" id="toggle-team-size" class="toggle-input" hidden>
                                <label for="toggle-team-size" class="select-header">
                                    <span id="selected-team-size">انتخاب کنید</span>
                                    <span class="arrow">▼</span>
                                </label>
                                <div class="options-container">
                                    <label class="option">
                                        <input type="checkbox" name="team_size[]" value="small">
                                        <span>کوچک (2-5 نفر) (Small: 2-5 members)</span>
                                    </label>
                                    <label class="option">
                                        <input type="checkbox" name="team_size[]" value="medium">
                                        <span>متوسط (6-10 نفر) (Medium: 6-10 members)</span>
                                    </label>
                                    <!-- بقیه گزینه‌ها ... -->
                                </div>
                            </div>
                        </div>

                    </div>


                    <div class="option-serch-all-registration">
                        <p class="option-serch-all-registration-p">جویندگان کار</p>
                        <input type="checkbox" class="option-serch-all-registration-select" value="">
                    </div>
                    <div class="option-serch-all-registration">
                        <p class="option-serch-all-registration-p">سرمایه گذاران</p>
                        <input type="checkbox" class="option-serch-all-registration-select" value="">
                    </div>
                    <div class="option-serch-all-registration">
                        <p class="option-serch-all-registration-p">ارائه‌دهندگان تجهیزات</p>
                        <input type="checkbox" class="option-serch-all-registration-select" value="">
                    </div>

                    <div class="option-serch-all-registration">
                        <p class="option-serch-all-registration-p">شهر</p>
                        <div class="option-serch-all-registration-select-div-city">
                            <select id="location" name="location" class="option-serch-all-registration-select-city">
                                <option value="">انتخاب کنید</option>
                                <option value="tehran">تهران (Tehran)</option>
                                <option value="isfahan">اصفهان (Isfahan)</option>
                                <option value="mashhad">مشهد (Mashhad)</option>
                                <option value="shiraz">شیراز (Shiraz)</option>
                                <option value="tabriz">تبریز (Tabriz)</option>
                                <option value="online-remote">آنلاین/ریموت (Online/Remote)</option>
                                <option value="rural">روستایی (Rural)</option>
                                <option value="urban">شهری (Urban)</option>
                                <option value="international">بین‌المللی (International)</option>
                                <option value="provincial">استانی (Provincial, e.g., Khorasan, Fars)</option>
                                <option value="regional">منطقه‌ای (Regional, e.g., North, South)</option>
                                <option value="abroad">خارج از کشور (Abroad)</option>
                            </select>
                        </div>
                    </div>

                </div>
                <div class="serch-all">

                </div>

            </div>
        </div>
    </div>
    <script src="./js/script.js"></script>

</body>

</html>
