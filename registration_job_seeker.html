<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت‌نام جویندگان کار</title>
    <link rel="stylesheet" href="./css/styles.css">

</head>

<body class="registration-body">

    <div class="registration-container">
        <div class="registration-header">
            <h1>ثبت‌نام جویندگان کار</h1>
            <p>اطلاعات خود را با دقت وارد کنید</p>
        </div>

        <div class="registration-content">

            <form id="business-form">

                <fieldset>
                    <legend>اطلاعات فردی</legend>

                    <div class="filling-form">
                        <!-- مهارت‌ها -->
                        <div class="multi-select-wrapper form-group form-group-select">
                            <label for="toggle-skills">مهارت‌ها:</label>
                            <input type="checkbox" id="toggle-skills" class="toggle-input" hidden>
                            <label for="toggle-skills" class="select-header">
                                <span id="selected-skills">انتخاب کنید</span>
                                <span class="arrow">▼</span>
                            </label>
                            <div class="options-container">
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="programming">
                                    <span>برنامه‌نویسی (Programming)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="graphic-design">
                                    <span>طراح گرافیک (Graphic Design)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="project-management">
                                    <span>مدیریت پروژه (Project Management)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="digital-marketing">
                                    <span>بازاریابی دیجیتال (Digital Marketing)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="data-analysis">
                                    <span>تحلیل داده (Data Analysis)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="sales">
                                    <span>فروش (Sales)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="accounting">
                                    <span>حسابداری (Accounting)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="software-engineering">
                                    <span>مهندسی نرم‌افزار (Software Engineering)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="seo">
                                    <span>سئو و بهینه‌سازی (SEO)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="web-design">
                                    <span>طراحی وب (Web Design)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="social-media-management">
                                    <span>مدیریت شبکه‌های اجتماعی (Social Media Management)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="app-development">
                                    <span>توسعه اپلیکیشن (App Development)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="rnd">
                                    <span>تحقیق و توسعه (R&D)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="hr-management">
                                    <span>مدیریت منابع انسانی (HR Management)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="photography">
                                    <span>عکاسی و فیلم‌برداری (Photography/Videography)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="writing">
                                    <span>نویسندگی (Writing)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="translation">
                                    <span>ترجمه (Translation)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="mechanical-engineering">
                                    <span>مهندسی مکانیک (Mechanical Engineering)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="skills[]" value="supply-chain-management">
                                    <span>مدیریت زنجیره تأمین (Supply Chain Management)</span>
                                </label>
                            </div>
                        </div>


                        <div class="form-group form-group-select">
                            <label for="experience-level">سطح تجربه:</label>
                            <select id="experience-level" name="experience-level">
                                <option value="">انتخاب کنید</option>
                                <option value="beginner">تازه‌کار (Beginner)</option>
                                <option value="intermediate">متوسط (Intermediate)</option>
                                <option value="professional">حرفه‌ای (Professional)</option>
                                <option value="expert">متخصص (Expert)</option>
                                <option value="no-experience">بدون تجربه (No Experience)</option>
                            </select>
                        </div>

                        <div class="form-group form-group-select">
                            <label for="location">مکان (جغرافیایی):</label>
                            <select id="location" name="location">
                                <option value="">انتخاب کنید</option>
                                <option value="tehran">تهران (Tehran)</option>
                                <option value="isfahan">اصفهان (Isfahan)</option>
                                <option value="mashhad">مشهد (Mashhad)</option>
                                <option value="shiraz">شیراز (Shiraz)</option>
                                <option value="tabriz">تبریز (Tabriz)</option>
                                <option value="online-remote">آنلاین/ریموت (Online/Remote)</option>
                                <option value="rural">روستایی (Rural)</option>
                                <option value="urban">شهری (Urban)</option>
                                <option value="international">بین‌المللی (International)</option>
                                <option value="provincial">استانی (Provincial, e.g., Khorasan, Fars)</option>
                                <option value="regional">منطقه‌ای (Regional, e.g., North, South)</option>
                                <option value="abroad">خارج از کشور (Abroad)</option>
                            </select>
                        </div>

                        <div class="multi-select-wrapper form-group form-group-select">
                            <label for="location">زبان ها:</label>
                            <input type="checkbox" id="toggle-languages" class="toggle-input" hidden>

                            <label for="toggle-languages" class="select-header">
                                <span id="selected-text">انتخاب کنید</span>
                                <span class="arrow">▼</span>
                            </label>

                            <div class="options-container">
                                <label class="option">
                                    <input type="checkbox" name="languages[]" value="persian" class="lang-check">
                                    <span>فارسی (Persian)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="languages[]" value="english" class="lang-check">
                                    <span>انگلیسی (English)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="languages[]" value="arabic" class="lang-check">
                                    <span>عربی (Arabic)</span>
                                </label>
                                <label class="option">
                                    <input type="checkbox" name="languages[]" value="turkish" class="lang-check">
                                    <span>ترکی (Turkish)</span>
                                </label>
                            </div>
                        </div>

<!--                         <div class="form-group form-group-select">
                            <label for="system-type">aaa</label>
                            <select id="system-type" name="system-type">
                                <option value="">انتخاب کنید</option>
                                <option value="aaa">aaa</option>
                            </select>
                        </div> -->


                        <div class="form-group">
                            <label for="contract-type">عکس پروفایل:</label>
                            <input type="file">
                        </div>

                    </div>

                    <div class="form-group">
                        <label for="contract-type">نام و نام خوانوادگی:</label>
                        <textarea class="input-project-name"></textarea>
                    </div>


                    <div class="form-group">
                        <label for="contract-type">توضیحات فردی:</label>
                        <textarea class="input-project-description"></textarea>
                    </div>
                </fieldset>


                <!-- بخش نیروی انسانی -->
                <div class="optional-section" id="team-block">
                    <div class="toggle-header addable-header">
                        <button type="button" class="btn-add" data-target="team">
                            + نیاز به کار (شغل) دارم
                        </button>
                    </div>

                    <div class="added-items" id="team-items"></div>

                    <!-- قالب مخفی برای clone کردن -->
                    <template id="team-template">
                        <div class="added-item">
                            <div class="form-row">
                                <div class="filling-form">
                                    <!-- نوع سیستم / ساختار سازمانی -->
                                    <div class="multi-select-wrapper form-group form-group-select">
                                        <label for="toggle-system-type">نوع سیستم / ساختار سازمانی</label>
                                        <input type="checkbox" id="toggle-system-type" class="toggle-input" hidden>
                                        <label for="toggle-system-type" class="select-header">
                                            <span id="selected-system-type">انتخاب کنید</span>
                                            <span class="arrow">▼</span>
                                        </label>
                                        <div class="options-container">
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="corporate">
                                                <span>شرکتی (Corporate/Company)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="team-based">
                                                <span>تیمی (Team-based)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="workshop">
                                                <span>کارگاهی (Workshop/Factory)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="startup">
                                                <span>استارتاپی (Startup)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="non-profit">
                                                <span>غیرانتفاعی (Non-profit)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="freelance">
                                                <span>فریلنسری (Freelance)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="cooperative">
                                                <span>تعاونی (Cooperative)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="family-business">
                                                <span>خانوادگی (Family Business)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="online-remote">
                                                <span>آنلاین/ریموت (Online/Remote)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="project-based">
                                                <span>پروژه‌ای (Project-based)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="partnership">
                                                <span>مشارکتی (Partnership)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="government-linked">
                                                <span>دولتی (Government-linked)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="private">
                                                <span>خصوصی (Private)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="system_type[]" value="hybrid">
                                                <span>هیبریدی (Hybrid)</span>
                                            </label>
                                        </div>
                                    </div>

                                    <!-- اندازه تیم -->
                                    <div class="multi-select-wrapper form-group form-group-select">
                                        <label for="toggle-team-size">اندازه تیم:</label>
                                        <input type="checkbox" id="toggle-team-size" class="toggle-input" hidden>
                                        <label for="toggle-team-size" class="select-header">
                                            <span id="selected-team-size">انتخاب کنید</span>
                                            <span class="arrow">▼</span>
                                        </label>
                                        <div class="options-container">
                                            <label class="option">
                                                <input type="checkbox" name="team_size[]" value="small">
                                                <span>کوچک (2-5 نفر) (Small: 2-5 members)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="team_size[]" value="medium">
                                                <span>متوسط (6-10 نفر) (Medium: 6-10 members)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="team_size[]" value="large">
                                                <span>بزرگ (بیش از 10 نفر) (Large: More than 10 members)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="team_size[]" value="solo">
                                                <span>تک‌نفره (Solo)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="team_size[]" value="unlimited">
                                                <span>نامحدود (Unlimited)</span>
                                            </label>
                                        </div>
                                    </div>

                                    <!-- مدل کسب‌وکار -->
                                    <div class="multi-select-wrapper form-group form-group-select">
                                        <label for="toggle-business-model">مدل کسب‌وکار:</label>
                                        <input type="checkbox" id="toggle-business-model" class="toggle-input" hidden>
                                        <label for="toggle-business-model" class="select-header">
                                            <span id="selected-business-model">انتخاب کنید</span>
                                            <span class="arrow">▼</span>
                                        </label>
                                        <div class="options-container">
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="marketplace">
                                                <span>پلتفرم / مارکت‌پلیس (Marketplace)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="saas">
                                                <span>اشتراکی / SaaS (Subscription / Software as a Service)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="freemium">
                                                <span>فریمیوم (Freemium)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="commission-based">
                                                <span>کمیسیون‌محور (Commission-based)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="direct-sales">
                                                <span>فروش مستقیم محصول (Direct Product Sales)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="service-based">
                                                <span>خدمات آنلاین / آفلاین (Service-based)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]"
                                                    value="content-subscription">
                                                <span>اشتراک محتوا (Content Subscription)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="ad-based">
                                                <span>تبلیغات و اسپانسرشیپ (Ad-based)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="sharing-economy">
                                                <span>مدل اشتراکی تجهیزات / فضا (Sharing Economy)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="on-demand">
                                                <span>تولید به سفارش (On-demand Production)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="business_model[]" value="crowdfunding">
                                                <span>کراودفاندینگ / سرمایه‌گذاری جمعی (Crowdfunding)</span>
                                            </label>
                                        </div>
                                    </div>

                                    <!-- مرحله رشد / نوع استارتاپ -->
                                    <div class="multi-select-wrapper form-group form-group-select">
                                        <label for="toggle-startup-stage">مرحله رشد / نوع استارتاپ:</label>
                                        <input type="checkbox" id="toggle-startup-stage" class="toggle-input" hidden>
                                        <label for="toggle-startup-stage" class="select-header">
                                            <span id="selected-startup-stage">انتخاب کنید</span>
                                            <span class="arrow">▼</span>
                                        </label>
                                        <div class="options-container">
                                            <label class="option">
                                                <input type="checkbox" name="startup_stage[]" value="pre-seed">
                                                <span>ایده اولیه / پیش‌استارتاپ (Idea / Pre-seed)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="startup_stage[]" value="mvp">
                                                <span>MVP / محصول اولیه (MVP / Early Stage)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="startup_stage[]" value="growth">
                                                <span>در حال رشد سریع (Growth Stage)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="startup_stage[]" value="scalable">
                                                <span>مقیاس‌پذیر بالا (Scalable / High-growth)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="startup_stage[]" value="small-local">
                                                <span>کسب‌وکار کوچک محلی (Small Local Business)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="startup_stage[]" value="social-impact">
                                                <span>استارتاپ اجتماعی / تأثیرگذار (Social Impact Startup)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="startup_stage[]" value="lifestyle">
                                                <span>استارتاپ خریدنی / کوچک (Buyable / Lifestyle Startup)</span>
                                            </label>
                                        </div>
                                    </div>

                                    <!-- نوع محصول / خدمت -->
                                    <div class="multi-select-wrapper form-group form-group-select">
                                        <label for="toggle-product-type">نوع محصول / خدمت:</label>
                                        <input type="checkbox" id="toggle-product-type" class="toggle-input" hidden>
                                        <label for="toggle-product-type" class="select-header">
                                            <span id="selected-product-type">انتخاب کنید</span>
                                            <span class="arrow">▼</span>
                                        </label>
                                        <div class="options-container">
                                            <label class="option">
                                                <input type="checkbox" name="product_type[]" value="mobile-app">
                                                <span>اپلیکیشن موبایل (Mobile App)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="product_type[]" value="web-platform">
                                                <span>وب‌سایت / پلتفرم آنلاین (Web Platform)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="product_type[]" value="hardware-software">
                                                <span>سخت‌افزار + نرم‌افزار (Hardware + Software)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="product_type[]" value="offline-service">
                                                <span>خدمات فیزیکی / حضوری (Offline / Physical Service)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="product_type[]" value="digital-content">
                                                <span>محتوای دیجیتال (Digital Content)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="product_type[]" value="physical-product">
                                                <span>محصول فیزیکی (Physical Product)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="product_type[]" value="consulting">
                                                <span>خدمات مشاوره‌ای / منتورینگ (Consulting / Mentoring)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="product_type[]" value="ai-tools">
                                                <span>ابزارهای هوش مصنوعی / اتوماسیون (AI Tools)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="product_type[]" value="cloud-services">
                                                <span>خدمات ابری / کلود (Cloud Services)</span>
                                            </label>
                                        </div>
                                    </div>

                                    <!-- تمرکز جغرافیایی / بازار هدف -->
                                    <div class="multi-select-wrapper form-group form-group-select">
                                        <label for="toggle-market-focus">تمرکز جغرافیایی / بازار هدف:</label>
                                        <input type="checkbox" id="toggle-market-focus" class="toggle-input" hidden>
                                        <label for="toggle-market-focus" class="select-header">
                                            <span id="selected-market-focus">انتخاب کنید</span>
                                            <span class="arrow">▼</span>
                                        </label>
                                        <div class="options-container">
                                            <label class="option">
                                                <input type="checkbox" name="market_focus[]" value="local">
                                                <span>محلی / شهری (Local / City-based)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="market_focus[]" value="provincial">
                                                <span>استانی / منطقه‌ای (Provincial)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="market_focus[]" value="national">
                                                <span>سراسری ایران (National)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="market_focus[]" value="diaspora">
                                                <span>فارسی‌زبانان خارج از کشور (Persian-speaking Diaspora)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="market_focus[]" value="export">
                                                <span>صادرات‌محور (Export-oriented)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="market_focus[]" value="global">
                                                <span>بین‌المللی (Global)</span>
                                            </label>
                                        </div>
                                    </div>

                                    <!-- نیاز / مشکل حل‌شده -->
                                    <div class="multi-select-wrapper form-group form-group-select">
                                        <label for="toggle-problem-solved">نیاز / مشکل حل‌شده:</label>
                                        <input type="checkbox" id="toggle-problem-solved" class="toggle-input" hidden>
                                        <label for="toggle-problem-solved" class="select-header">
                                            <span id="selected-problem-solved">انتخاب کنید</span>
                                            <span class="arrow">▼</span>
                                        </label>
                                        <div class="options-container">
                                            <label class="option">
                                                <input type="checkbox" name="problem_solved[]" value="time-saving">
                                                <span>صرفه‌جویی در زمان (Time-saving)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="problem_solved[]" value="cost-reduction">
                                                <span>کاهش هزینه (Cost Reduction)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="problem_solved[]" value="accessibility">
                                                <span>دسترسی آسان‌تر (Accessibility)</span>
                                            </label>
                                            <label class="option">
                                                <input type="checkbox" name="problem_solved[]" value="quality-of-life">
                                                <span>بهبود کیفیت زندگی (Quality of Life)</span>
                                            </label>
